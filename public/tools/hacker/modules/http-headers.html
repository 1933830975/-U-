<div>
    <h3>📨 HTTP 头分析</h3>
    <input type="text" id="url" placeholder="URL (http:// 或 https://)" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="fetchBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">获取 Headers</button>
    <div id="result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待请求...</div>
</div>
<script>
    async function fetchHeaders(url) {
        try {
            const res = await fetch(url);
            const headers = {};
            res.headers.forEach((value, name) => { headers[name] = value; });
            return { status: res.status, headers };
        } catch (err) {
            return null;
        }
    }
    document.getElementById('fetchBtn').addEventListener('click', async () => {
        let url = document.getElementById('url').value.trim();
        if (!url) { document.getElementById('result').innerText = '请输入 URL'; return; }
        if (!url.startsWith('http')) url = 'https://' + url;
        document.getElementById('result').innerText = '请求中...';
        const result = await fetchHeaders(url);
        if (!result) {
            document.getElementById('result').innerText = '请求失败，可能跨域或地址无效';
            return;
        }
        let output = `状态码: ${result.status}\n\nHeaders:\n`;
        for (let [k,v] of Object.entries(result.headers)) {
            output += `${k}: ${v}\n`;
        }
        document.getElementById('result').innerText = output;
    });
</script>
