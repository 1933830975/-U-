<div>
    <h3>🌐 公网 IP 查询</h3>
    <button id="getIpBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">获取我的公网 IP</button>
    <div id="result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">点击获取...</div>
</div>
<script>
    async function getMyIP() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        } catch (err) {
            return '获取失败';
        }
    }
    document.getElementById('getIpBtn').addEventListener('click', async () => {
        document.getElementById('result').innerText = '查询中...';
        const ip = await getMyIP();
        document.getElementById('result').innerText = `您的公网 IP: ${ip}`;
    });
</script>
