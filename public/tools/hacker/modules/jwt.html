<div>
    <h3>🔖 JWT 解析</h3>
    <textarea id="jwtInput" rows="4" placeholder="输入 JWT Token" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <button id="parseJwtBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">解析</button>
    <div id="jwtResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待解析...</div>
</div>
<script>
    function parseJWT(token) {
        try {
            const parts = token.split('.');
            if (parts.length !== 3) throw new Error();
            const header = JSON.parse(atob(parts[0]));
            const payload = JSON.parse(atob(parts[1]));
            return { header, payload };
        } catch(e) {
            return null;
        }
    }
    document.getElementById('parseJwtBtn').addEventListener('click', () => {
        const token = document.getElementById('jwtInput').value.trim();
        if (!token) { document.getElementById('jwtResult').innerText = '请输入 JWT Token'; return; }
        const parsed = parseJWT(token);
        if (!parsed) {
            document.getElementById('jwtResult').innerText = '无效的 JWT';
            return;
        }
        document.getElementById('jwtResult').innerHTML = `<strong>Header:</strong><br>${JSON.stringify(parsed.header, null, 2)}<br><br><strong>Payload:</strong><br>${JSON.stringify(parsed.payload, null, 2)}`;
    });
</script>
