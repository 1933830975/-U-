<div>
    <h3>🌐 IP 归属地查询</h3>
    <input type="text" id="ipInput" placeholder="输入 IP 地址" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="ipBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">查询</button>
    <div id="ipResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待查询...</div>
</div>
<script>
    async function lookupIP(ip) {
        const url = `http://ip-api.com/json/${ip}?fields=status,country,regionName,city,isp,query`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            if (data.status === 'success') {
                return `IP: ${data.query}\n国家: ${data.country}\n地区: ${data.regionName}\n城市: ${data.city}\nISP: ${data.isp}`;
            } else {
                return '查询失败，IP可能无效或API限制';
            }
        } catch (err) {
            return '网络错误，请稍后重试';
        }
    }
    document.getElementById('ipBtn').addEventListener('click', async () => {
        const ip = document.getElementById('ipInput').value.trim();
        if (!ip) { document.getElementById('ipResult').innerText = '请输入 IP 地址'; return; }
        document.getElementById('ipResult').innerText = '查询中...';
        const res = await lookupIP(ip);
        document.getElementById('ipResult').innerText = res;
    });
</script>
