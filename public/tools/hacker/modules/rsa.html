<div>
    <h3>🗝️ RSA 密钥生成</h3>
    <button id="genRsaBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">生成 RSA 密钥对</button>
    <div id="rsaResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待生成...</div>
</div>
<script>
    async function generateRSA() {
        const keyPair = await crypto.subtle.generateKey(
            { name: "RSA-OAEP", modulusLength: 2048, publicExponent: new Uint8Array([1,0,1]), hash: "SHA-256" },
            true,
            ["encrypt", "decrypt"]
        );
        const publicKey = await crypto.subtle.exportKey("spki", keyPair.publicKey);
        const privateKey = await crypto.subtle.exportKey("pkcs8", keyPair.privateKey);
        const publicPem = `-----BEGIN PUBLIC KEY-----\n${arrayBufferToBase64(publicKey).match(/.{1,64}/g).join('\n')}\n-----END PUBLIC KEY-----`;
        const privatePem = `-----BEGIN PRIVATE KEY-----\n${arrayBufferToBase64(privateKey).match(/.{1,64}/g).join('\n')}\n-----END PRIVATE KEY-----`;
        return { public: publicPem, private: privatePem };
    }
    function arrayBufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
        return btoa(binary);
    }
    document.getElementById('genRsaBtn').addEventListener('click', async () => {
        document.getElementById('rsaResult').innerText = '生成中...';
        const keys = await generateRSA();
        document.getElementById('rsaResult').innerHTML = `<strong>公钥:</strong><br>${keys.public}<br><br><strong>私钥:</strong><br>${keys.private}`;
    });
</script>
