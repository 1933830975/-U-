<div>
    <h3>🔄 ROT13</h3>
    <textarea id="rot13Input" rows="3" placeholder="输入文本" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <button id="rot13Btn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">ROT13 转换</button>
    <div id="rot13Result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待转换...</div>
</div>
<script>
    function rot13(str) {
        return str.replace(/[a-zA-Z]/g, c => {
            const base = c <= 'Z' ? 65 : 97;
            return String.fromCharCode(((c.charCodeAt(0) - base + 13) % 26) + base);
        });
    }
    document.getElementById('rot13Btn').addEventListener('click', () => {
        const text = document.getElementById('rot13Input').value;
        if (!text) { document.getElementById('rot13Result').innerText = '请输入文本'; return; }
        const result = rot13(text);
        document.getElementById('rot13Result').innerText = result;
    });
</script>
