<div>
    <h3>🔍 端口扫描</h3>
    <input type="text" id="target" placeholder="目标 IP 或域名" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="scanBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">扫描常用端口</button>
    <div id="result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待扫描...</div>
</div>
<script>
    const commonPorts = [
        { port: 21, service: 'FTP' }, { port: 22, service: 'SSH' }, { port: 23, service: 'Telnet' },
        { port: 25, service: 'SMTP' }, { port: 80, service: 'HTTP' }, { port: 443, service: 'HTTPS' },
        { port: 3306, service: 'MySQL' }, { port: 3389, service: 'RDP' }, { port: 8080, service: 'HTTP-Proxy' }
    ];
    async function scanPort(host, port) {
        // 实际扫描需要后端代理，此处为模拟演示
        return new Promise(resolve => {
            setTimeout(() => resolve(Math.random() > 0.6), 50);
        });
    }
    document.getElementById('scanBtn').addEventListener('click', async () => {
        const target = document.getElementById('target').value.trim();
        if (!target) { document.getElementById('result').innerText = '请输入目标'; return; }
        document.getElementById('result').innerText = '扫描中...\n';
        let resultText = `目标: ${target}\n\n`;
        for (const p of commonPorts) {
            const open = await scanPort(target, p.port);
            resultText += `${p.port} (${p.service}): ${open ? '开放' : '关闭'}\n`;
        }
        document.getElementById('result').innerText = resultText;
    });
</script>
