<div>
    <h3>🎲 随机密码生成</h3>
    <div style="margin: 0.5rem 0;">
        <label><input type="checkbox" id="useUpper" checked> 大写字母</label>
        <label><input type="checkbox" id="useLower" checked> 小写字母</label>
        <label><input type="checkbox" id="useNumbers" checked> 数字</label>
        <label><input type="checkbox" id="useSymbols" checked> 符号</label>
    </div>
    <input type="number" id="pwdLength" value="12" min="4" max="64" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="genPwdBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">生成密码</button>
    <div id="pwdResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待生成...</div>
</div>
<script>
    function generatePassword(length, useUpper, useLower, useNumbers, useSymbols) {
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+~`-=[]{}|;:,.<>?';
        let chars = '';
        if (useUpper) chars += upper;
        if (useLower) chars += lower;
        if (useNumbers) chars += numbers;
        if (useSymbols) chars += symbols;
        if (chars === '') return '请至少选择一种字符类型';
        let password = '';
        for (let i = 0; i < length; i++) {
            password += chars[Math.floor(Math.random() * chars.length)];
        }
        return password;
    }
    document.getElementById('genPwdBtn').addEventListener('click', () => {
        const length = parseInt(document.getElementById('pwdLength').value);
        const useUpper = document.getElementById('useUpper').checked;
        const useLower = document.getElementById('useLower').checked;
        const useNumbers = document.getElementById('useNumbers').checked;
        const useSymbols = document.getElementById('useSymbols').checked;
        const pwd = generatePassword(length, useUpper, useLower, useNumbers, useSymbols);
        document.getElementById('pwdResult').innerText = pwd;
    });
</script>
