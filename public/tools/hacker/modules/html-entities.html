<div>
    <h3>📄 HTML 实体编解码</h3>
    <textarea id="htmlInput" rows="3" placeholder="输入文本或 HTML 实体" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <button id="encodeHtmlBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">编码为实体</button>
    <button id="decodeHtmlBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">解码实体</button>
    <div id="htmlResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待操作...</div>
</div>
<script>
    function encodeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    function decodeHtml(str) {
        const textarea = document.createElement('textarea');
        textarea.innerHTML = str;
        return textarea.value;
    }
    document.getElementById('encodeHtmlBtn').addEventListener('click', () => {
        const text = document.getElementById('htmlInput').value;
        if (!text) { document.getElementById('htmlResult').innerText = '请输入文本'; return; }
        const result = encodeHtml(text);
        document.getElementById('htmlResult').innerText = result;
    });
    document.getElementById('decodeHtmlBtn').addEventListener('click', () => {
        const text = document.getElementById('htmlInput').value;
        if (!text) { document.getElementById('htmlResult').innerText = '请输入 HTML 实体'; return; }
        const result = decodeHtml(text);
        document.getElementById('htmlResult').innerText = result;
    });
</script>
