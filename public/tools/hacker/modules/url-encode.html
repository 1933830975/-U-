<div>
    <h3>🔗 URL 编解码</h3>
    <textarea id="urlInput" rows="3" placeholder="输入文本或 URL 编码字符串" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <button id="encodeBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">编码</button>
    <button id="decodeBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">解码</button>
    <div id="urlResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待操作...</div>
</div>
<script>
    function urlEncode(str) { try { return encodeURIComponent(str); } catch(e) { return '编码失败'; } }
    function urlDecode(str) { try { return decodeURIComponent(str); } catch(e) { return '解码失败'; } }
    document.getElementById('encodeBtn').addEventListener('click', () => {
        const text = document.getElementById('urlInput').value;
        if (!text) { document.getElementById('urlResult').innerText = '请输入文本'; return; }
        const result = urlEncode(text);
        document.getElementById('urlResult').innerText = result;
    });
    document.getElementById('decodeBtn').addEventListener('click', () => {
        const text = document.getElementById('urlInput').value;
        if (!text) { document.getElementById('urlResult').innerText = '请输入 URL 编码字符串'; return; }
        const result = urlDecode(text);
        document.getElementById('urlResult').innerText = result;
    });
</script>
