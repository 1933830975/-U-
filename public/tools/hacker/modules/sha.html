<div>
    <h3>🔑 SHA 系列哈希</h3>
    <input type="text" id="shaInput" placeholder="输入文本" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <select id="shaAlgo" style="background:#010a12; border:1px solid #0ff; color:#0ff; padding:0.5rem; border-radius:8px; margin-bottom:0.5rem;">
        <option value="SHA-1">SHA-1</option>
        <option value="SHA-256" selected>SHA-256</option>
        <option value="SHA-384">SHA-384</option>
        <option value="SHA-512">SHA-512</option>
    </select>
    <button id="shaBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">计算</button>
    <div id="shaResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待计算...</div>
</div>
<script>
    async function sha(message, algo) {
        const encoder = new TextEncoder();
        const data = encoder.encode(message);
        const hash = await crypto.subtle.digest(algo, data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    document.getElementById('shaBtn').addEventListener('click', async () => {
        const text = document.getElementById('shaInput').value;
        const algo = document.getElementById('shaAlgo').value;
        if (!text) { document.getElementById('shaResult').innerText = '请输入文本'; return; }
        const hash = await sha(text, algo);
        document.getElementById('shaResult').innerText = `${algo}:\n${hash}`;
    });
</script>
