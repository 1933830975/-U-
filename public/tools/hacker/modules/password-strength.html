<div>
    <h3>🔐 密码强度检测</h3>
    <input type="text" id="passwordInput" placeholder="输入密码" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="pwdBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">检测强度</button>
    <div id="pwdResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待检测...</div>
</div>
<script>
    function checkPasswordStrength(pwd) {
        if (!pwd) return '请输入密码';
        let strength = 0;
        if (pwd.length >= 8) strength += 1;
        if (/[a-z]/.test(pwd)) strength += 1;
        if (/[A-Z]/.test(pwd)) strength += 1;
        if (/[0-9]/.test(pwd)) strength += 1;
        if (/[^a-zA-Z0-9]/.test(pwd)) strength += 1;
        const level = ['极弱', '弱', '一般', '较强', '强', '极强'];
        return `强度: ${level[strength]} (得分 ${strength}/5)`;
    }
    document.getElementById('pwdBtn').addEventListener('click', () => {
        const pwd = document.getElementById('passwordInput').value;
        const res = checkPasswordStrength(pwd);
        document.getElementById('pwdResult').innerText = res;
    });
</script>
