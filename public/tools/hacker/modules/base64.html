<div>
    <h3>📦 Base64 编解码</h3>
    <textarea rows="2" id="base64Input" placeholder="输入文本" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <div>
        <button id="base64EncodeBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer; margin-right:0.5rem;">编码</button>
        <button id="base64DecodeBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">解码</button>
    </div>
    <div id="base64Result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待操作...</div>
</div>
<script>
    function base64Encode(str) {
        try { return btoa(unescape(encodeURIComponent(str))); } catch(e) { return '编码失败，请检查输入'; }
    }
    function base64Decode(str) {
        try { return decodeURIComponent(escape(atob(str))); } catch(e) { return '解码失败，无效的 Base64 字符串'; }
    }
    document.getElementById('base64EncodeBtn').addEventListener('click', () => {
        const text = document.getElementById('base64Input').value;
        if (!text) { document.getElementById('base64Result').innerText = '请输入文本'; return; }
        const encoded = base64Encode(text);
        document.getElementById('base64Result').innerText = `编码结果: ${encoded}`;
    });
    document.getElementById('base64DecodeBtn').addEventListener('click', () => {
        const text = document.getElementById('base64Input').value;
        if (!text) { document.getElementById('base64Result').innerText = '请输入 Base64 字符串'; return; }
        const decoded = base64Decode(text);
        document.getElementById('base64Result').innerText = `解码结果: ${decoded}`;
    });
</script>
