<div>
    <h3>🧮 IP 段计算器</h3>
    <input type="text" id="cidr" placeholder="CIDR 格式 (如 192.168.1.0/24)" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="calcBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">计算</button>
    <div id="result" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待计算...</div>
</div>
<script>
    function ipToInt(ip) {
        return ip.split('.').reduce((int, oct) => (int << 8) + parseInt(oct, 10), 0) >>> 0;
    }
    function intToIp(int) {
        return [(int >>> 24) & 0xFF, (int >>> 16) & 0xFF, (int >>> 8) & 0xFF, int & 0xFF].join('.');
    }
    function calculateCIDR(cidr) {
        let [ip, maskBits] = cidr.split('/');
        maskBits = parseInt(maskBits, 10);
        let ipInt = ipToInt(ip);
        let mask = (~0) << (32 - maskBits);
        let network = ipInt & mask;
        let broadcast = network | (~mask);
        let firstHost = network + 1;
        let lastHost = broadcast - 1;
        let totalHosts = Math.pow(2, 32 - maskBits) - 2;
        return {
            network: intToIp(network),
            broadcast: intToIp(broadcast),
            firstHost: intToIp(firstHost),
            lastHost: intToIp(lastHost),
            totalHosts: totalHosts
        };
    }
    document.getElementById('calcBtn').addEventListener('click', () => {
        const cidr = document.getElementById('cidr').value.trim();
        if (!cidr) { document.getElementById('result').innerText = '请输入 CIDR'; return; }
        try {
            const res = calculateCIDR(cidr);
            document.getElementById('result').innerHTML = `
                网络地址: ${res.network}<br>
                广播地址: ${res.broadcast}<br>
                可用主机范围: ${res.firstHost} - ${res.lastHost}<br>
                可用主机数量: ${res.totalHosts}
            `;
        } catch(e) {
            document.getElementById('result').innerText = '格式错误';
        }
    });
</script>
