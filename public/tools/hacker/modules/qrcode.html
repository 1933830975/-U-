<div>
    <h3>📱 二维码生成</h3>
    <input type="text" id="qrText" placeholder="输入文本或URL" style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;">
    <button id="qrGenBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">生成二维码</button>
    <div id="qrCanvas" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; text-align:center;"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
    let qr = null;
    document.getElementById('qrGenBtn').addEventListener('click', () => {
        const text = document.getElementById('qrText').value;
        const container = document.getElementById('qrCanvas');
        if (!text) { container.innerHTML = '<div style="color:#ff3366">请输入内容</div>'; return; }
        container.innerHTML = '';
        new QRCode(container, { text: text, width: 200, height: 200 });
    });
</script>
