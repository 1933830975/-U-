<div>
    <h3>📋 JSON 格式化/压缩</h3>
    <textarea id="jsonInput" rows="6" placeholder='{"name":"test","value":123}' style="width:100%; background:#010a12; border:1px solid #0ff; padding:0.5rem; color:#0ff; border-radius:8px; margin:0.5rem 0;"></textarea>
    <button id="formatJsonBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">格式化</button>
    <button id="compressJsonBtn" style="background:#0a1a1f; border:1px solid #0ff; color:#0ff; padding:0.4rem 1rem; border-radius:20px; cursor:pointer;">压缩</button>
    <div id="jsonResult" class="result" style="background:#021016; border-left:3px solid #0ff; padding:0.5rem; margin-top:0.8rem; font-size:0.8rem;">等待操作...</div>
</div>
<script>
    function formatJson(str) {
        try {
            return JSON.stringify(JSON.parse(str), null, 2);
        } catch(e) {
            return '无效的 JSON';
        }
    }
    function compressJson(str) {
        try {
            return JSON.stringify(JSON.parse(str));
        } catch(e) {
            return '无效的 JSON';
        }
    }
    document.getElementById('formatJsonBtn').addEventListener('click', () => {
        const text = document.getElementById('jsonInput').value;
        if (!text) { document.getElementById('jsonResult').innerText = '请输入 JSON'; return; }
        const result = formatJson(text);
        document.getElementById('jsonResult').innerText = result;
    });
    document.getElementById('compressJsonBtn').addEventListener('click', () => {
        const text = document.getElementById('jsonInput').value;
        if (!text) { document.getElementById('jsonResult').innerText = '请输入 JSON'; return; }
        const result = compressJson(text);
        document.getElementById('jsonResult').innerText = result;
    });
</script>
