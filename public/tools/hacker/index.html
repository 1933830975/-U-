<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>黑客工具包 | 霓虹终端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Share Tech Mono', 'Fira Code', monospace;
            min-height: 100vh;
            color: #0ff;
        }
        .app { display: flex; height: 100vh; overflow: hidden; }
        .sidebar {
            width: 260px;
            background: rgba(5, 15, 20, 0.85);
            backdrop-filter: blur(12px);
            border-right: 1px solid #0ff;
            overflow-y: auto;
            padding: 1rem 0;
        }
        .sidebar-header {
            font-size: 1.2rem;
            text-align: center;
            padding: 1rem;
            border-bottom: 1px solid #0ff;
            margin-bottom: 1rem;
        }
        .tool-list { list-style: none; }
        .tool-item {
            padding: 0.6rem 1.2rem;
            margin: 0.2rem 0.5rem;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tool-item:hover { background: rgba(0, 255, 255, 0.2); box-shadow: 0 0 6px #0ff; }
        .tool-item.active { background: rgba(0, 255, 255, 0.3); border-left: 3px solid #0ff; }
        .main { flex: 1; overflow-y: auto; padding: 1.5rem; }
        .tool-content {
            background: rgba(8, 16, 24, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid #0ff;
            min-height: 100%;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #021016; }
        ::-webkit-scrollbar-thumb { background: #0ff; border-radius: 3px; }
        @media (max-width: 700px) { .sidebar { width: 200px; } .tool-item { font-size: 0.8rem; padding: 0.4rem 0.8rem; } .main { padding: 1rem; } }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">🔧 工具菜单</div>
        <ul class="tool-list" id="toolList"></ul>
    </div>
    <div class="main">
        <div class="tool-content" id="toolContent">
            <div style="text-align:center; padding: 2rem;">⚡ 请从左侧选择工具</div>
        </div>
    </div>
</div>

<script>
    let tools = [];
    async function loadTools() {
        try {
            const res = await fetch('/tools/hacker/tools.json');
            tools = await res.json();
            renderToolList();
            if (tools.length) loadTool(tools[0]);
        } catch (err) {
            console.error('加载工具列表失败', err);
            document.getElementById('toolList').innerHTML = '<li style="color:#ff3366">配置加载失败</li>';
        }
    }
    function renderToolList() {
        const container = document.getElementById('toolList');
        container.innerHTML = '';
        tools.forEach((tool, idx) => {
            const li = document.createElement('li');
            li.className = 'tool-item';
            li.innerHTML = `${tool.icon || '🔧'} ${tool.name}`;
            li.addEventListener('click', () => {
                document.querySelectorAll('.tool-item').forEach(item => item.classList.remove('active'));
                li.classList.add('active');
                loadTool(tool);
            });
            container.appendChild(li);
        });
        if (container.firstChild) container.firstChild.classList.add('active');
    }
    async function loadTool(tool) {
        const contentDiv = document.getElementById('toolContent');
        contentDiv.innerHTML = '<div style="text-align:center; padding: 2rem;">⏳ 加载中...</div>';
        try {
            const res = await fetch(`/tools/hacker/modules/${tool.module}`);
            if (!res.ok) throw new Error('加载失败');
            const html = await res.text();
            contentDiv.innerHTML = html;
            const scripts = contentDiv.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.textContent = oldScript.textContent;
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        } catch (err) {
            contentDiv.innerHTML = `<div style="color:#ff3366; text-align:center;">❌ 加载失败: ${tool.name}</div>`;
        }
    }
    loadTools();
</script>
</body>
</html>
