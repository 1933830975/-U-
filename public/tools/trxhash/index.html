<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRON 交易哈希查询 | 霓虹终端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            padding: 1.5rem;
            color: #0ff;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: rgba(8,16,24,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #0ff;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        input, button {
            background: #010a12;
            border: 1px solid #0ff;
            padding: 0.7rem;
            color: #0ff;
            border-radius: 12px;
            font-family: monospace;
            width: 100%;
            margin: 0.5rem 0;
        }
        button {
            background: #0a1a1f;
            cursor: pointer;
            width: auto;
            margin-right: 8px;
        }
        button:hover {
            background: #0ff;
            color: #000;
        }
        .result {
            background: #021016;
            border-left: 3px solid #0ff;
            padding: 0.8rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            word-break: break-all;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .error {
            border-left-color: #ff6666;
            color: #ff6666;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 8px 0;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🔍 TRON 交易哈希查询</h2>
        <input type="text" id="txid" placeholder="输入波场交易哈希 (64位十六进制)" value="">
        <div class="flex-row">
            <button id="queryBtn">查询交易详情</button>
            <button id="exampleBtn">示例哈希</button>
        </div>
        <div id="result" class="result">等待查询...</div>
    </div>
</div>

<script>
    const queryBtn = document.getElementById('queryBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const txidInput = document.getElementById('txid');
    const resultDiv = document.getElementById('result');

    // 使用您自己的真实交易哈希作为示例（确保有效）
    const exampleHash = '50916a82651b66058eedfa1b661cbea2d05bd90d15255bd93beceeb462d36f34';

    function formatTime(timestamp) {
        if (!timestamp) return '未知';
        const date = new Date(timestamp);
        return date.toLocaleString();
    }

    async function queryByTronscan(txid) {
        const url = `https://api.tronscan.org/api/transaction?hash=${txid}`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!data || !data.txID) return null;
            return data;
        } catch (err) {
            console.error('Tronscan API 错误:', err);
            return null;
        }
    }

    function parseTronscanData(data) {
        const txid = data.txID;
        const block = data.block;
        const timestamp = formatTime(data.timestamp);
        const fee = (data.fee || 0) / 1e6;

        let from = data.ownerAddress || '未知';
        let to = data.toAddress || '未知';
        let amount = 0;
        let tokenType = 'TRX';
        if (data.tokenInfo && data.tokenInfo.tokenId === 'TRX') {
            amount = (data.amount || 0) / 1e6;
            tokenType = 'TRX';
        } else if (data.tokenInfo && data.tokenInfo.tokenName) {
            amount = (data.amount || 0) / Math.pow(10, data.tokenInfo.decimals || 6);
            tokenType = data.tokenInfo.tokenName;
        } else {
            if (data.contractData) {
                from = data.contractData.owner_address || from;
                to = data.contractData.to_address || to;
                amount = (data.contractData.amount || 0) / 1e6;
            }
        }

        const status = data.result === 'SUCCESS' ? '成功' : '失败';

        let output = `交易哈希: ${txid}\n`;
        output += `区块高度: ${block}\n`;
        output += `时间: ${timestamp}\n`;
        output += `合约类型: ${data.contractType || '未知'}\n`;
        output += `发送方: ${from}\n`;
        output += `接收方: ${to}\n`;
        output += `金额: ${amount.toFixed(6)} ${tokenType}\n`;
        output += `手续费: ${fee.toFixed(6)} TRX\n`;
        output += `状态: ${status}`;
        return output;
    }

    async function queryTransaction(txid) {
        const tronscanData = await queryByTronscan(txid);
        if (tronscanData) {
            return parseTronscanData(tronscanData);
        }
        return '❌ 未找到该交易哈希，请检查哈希是否正确，或交易尚未上链。';
    }

    queryBtn.addEventListener('click', async () => {
        const txid = txidInput.value.trim();
        if (!txid) {
            resultDiv.innerHTML = '❌ 请输入交易哈希';
            resultDiv.classList.add('error');
            return;
        }
        // 关键：严格校验64位十六进制
        if (!/^[a-fA-F0-9]{64}$/.test(txid)) {
            resultDiv.innerHTML = '❌ 交易哈希格式不正确（应为64位十六进制字符串）';
            resultDiv.classList.add('error');
            return;
        }
        resultDiv.innerHTML = '⏳ 查询中...';
        resultDiv.classList.remove('error');
        const info = await queryTransaction(txid);
        resultDiv.innerHTML = info;
        if (info.startsWith('❌')) resultDiv.classList.add('error');
        else resultDiv.classList.remove('error');
    });

    exampleBtn.addEventListener('click', () => {
        txidInput.value = exampleHash;
        resultDiv.innerHTML = '示例哈希已填入，点击查询即可测试。';
        resultDiv.classList.remove('error');
    });
</script>
</body>
</html>
